<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>みていのおへや</title>

<style>
body{
    background:#f5f5f5;
    font-family:sans-serif;
    text-align:center;
    padding-top:60px;
}

h1{
    font-size:30px;
}

img{
    width:220px;
    cursor:pointer;
}

#text{
    margin-top:20px;
    font-size:24px;
    height:40px;
}
</style>
</head>

<body>

<h1>みていのおへや</h1>

<img
id="cat"
src="cat.png"
onclick="pet()"
>

<div id="text"></div>

<script>

const words = [
"にゃむ",
"にゃ",
"み",
"ちょーがないだね",
"ちね",
"辞世〜",
"にゃむあみだぶち",
"おしまい",
"いいにょ〜",
"キ！",
"えらいだね",
"戦“たたか”",
"Yummy"
];

let sleeping = false;
let sleepTimer;

function resetSleep() {
    clearTimeout(sleepTimer);

    sleeping = false;

    sleepTimer = setTimeout(() => {
        sleeping = true;
        document.getElementById("text").innerText = "…💤";
    }, 10000);
}

resetSleep();

function pet(){

cat.animate([
    { transform:"scale(1,1)" },
    { transform:"scale(1.18,0.82)" },
    { transform:"scale(0.90,1.10)" },
    { transform:"scale(1.05,0.95)" },
    { transform:"scale(0.98,1.02)" },
    { transform:"scale(1,1)" }
],{
    duration:350,
    easing:"cubic-bezier(.34,1.56,.64,1)"
});

    if(sleeping){

        document.getElementById("text").innerText = "にゃっ！";

        sleeping = false;

        resetSleep();

        return;

    }

    const text =
    words[Math.floor(Math.random()*words.length)];

    document.getElementById("text").innerText = text;

    resetSleep();

    const click = document.getElementById("click");
    const meow = document.getElementById("meow");

    if(Math.floor(Math.random()*20)===0){

        meow.currentTime = 0;
        meow.play();

    }else{

        click.currentTime = 0;
        click.play();

    }

}

</script>

</body>
</html>

<audio id="click" src="カーソル移動7.mp3"></audio>

<audio id="meow" src="猫の鳴き声1.mp3"></audio>
