<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>みていのおへや</title>

<style>
body{
    background:#f5f5f5;
    font-family:sans-serif;
    text-align:center;
    padding-top:60px;
}

h1{
    font-size:30px;
}

img{
    width:220px;
    cursor:pointer;
}

#text{
    margin-top:20px;
    font-size:24px;
    height:40px;
}
</style>
</head>

<body>

<h1>みていのおへや</h1>

<img
src="https://placekitten.com/300/300"
onclick="pet()"
>

<div id="text"></div>

<script>

const words = [
"にゃむ",
"にゃ",
"み",
"ちょーがないだね",
"ちね",
"辞世〜",
"にゃむあみだぶち",
"おしまい",
"いいにょ〜",
"キ！",
"えらいだね",
"戦“たたか”",
"Yummy"
];

function pet(){
    document.getElementById("text").innerText =
    words[Math.floor(Math.random()*words.length)];
}

</script>

</body>
</html>
